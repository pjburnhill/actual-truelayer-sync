name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run check:dependencies
      - run: npm audit --omit=dev
      - run: npm run check:types
      - run: npm test
      - run: npm run build
      - run: npm run scan:secrets
