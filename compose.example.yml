services:
  actual-truelayer-sync:
    image: ${ACTUAL_TRUELAYER_SYNC_IMAGE:?set an immutable sha tag or digest}
    container_name: actual-truelayer-sync
    user: '1000:1000'
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
      - ./secrets/actual-session-token:/run/secrets/actual-session-token:ro
      - ./secrets/actual-sync-id:/run/secrets/actual-sync-id:ro
      - ./secrets/truelayer-client-secret:/run/secrets/truelayer-client-secret:ro
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL:?set Actual server URL}
      ACTUAL_SESSION_TOKEN_FILE: /run/secrets/actual-session-token
      ACTUAL_SYNC_ID_FILE: /run/secrets/actual-sync-id
      TRUELAYER_CLIENT_ID: ${TRUELAYER_CLIENT_ID:?set public TrueLayer client ID}
      TRUELAYER_CLIENT_SECRET_FILE: /run/secrets/truelayer-client-secret
      # CRON_SCHEDULE: "17 */6 * * *"
      TZ: ${TZ:-UTC}
      LOG_FORMAT: json
